services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    command: gateway run
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${HERMES_GATEWAY_BIND:-127.0.0.1}:8642:8642"
      - "${HERMES_DASHBOARD_BIND:-127.0.0.1}:9119:9119"
    volumes:
      - ${HERMES_DATA_PATH:-/home/dodds/hermes/data}:/opt/data
      - ${DEV_WORKSPACE_PATH:-/home/dodds/workspace}:/workspace
      - ${HERMES_SSH_PATH:-/home/dodds/hermes-secrets/ssh}:/opt/hermes-ssh:ro
      - ./scripts:/opt/hermes-admin:ro
    environment:
      - TZ=${TZ:-Europe/London}
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - GIT_SSH_COMMAND=ssh -i /opt/hermes-ssh/id_ed25519 -o IdentitiesOnly=yes -o BatchMode=yes -o UserKnownHostsFile=/opt/hermes-ssh/known_hosts
    mem_limit: ${HERMES_MEM_LIMIT:-2g}
    cpus: ${HERMES_CPUS:-1.0}
