# Optional override for host Docker administration.
#
# Use only when you are comfortable treating Hermes as a host admin:
#   docker compose -f docker-compose.yml -f docker-compose.admin.yml up -d
#
# Mounting /var/run/docker.sock gives the container root-equivalent control
# over the host through Docker.
services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.admin
    image: hermes-agent:local-admin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MEDIA_REPO_PATH:-/home/dodds/docker}:/home/dodds/docker
    environment:
      - MEDIA_COMPOSE_FILE=/home/dodds/docker/docker-compose.yml
